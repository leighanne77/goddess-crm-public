services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: lynda
      POSTGRES_USER: lynda
      POSTGRES_PASSWORD: lynda_dev_only
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lynda"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
