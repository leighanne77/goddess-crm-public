<?xml version="1.0" encoding="UTF-8"?>
<!--
  DIN Favicon — per master Brand Guide §3.2:
  "Use a simplified mark — the red DIN letters only, without wings
  or stars — rendered at 32×32 px or 64×64 px."

  Cream background (#F5EEE0) + DIN Red letters (#C8202F) matches the
  document treatment from the brand guide. Slight rounded corners for
  modern app-icon feel.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="5" fill="#F5EEE0"/>
  <text
    x="16" y="22"
    font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="14"
    text-anchor="middle"
    fill="#C8202F"
    letter-spacing="-0.5"
  >DIN</text>
</svg>
